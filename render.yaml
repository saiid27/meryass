services:
  - type: web
    name: meryass-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: meryass-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: AUTO_FILL_PUBLIC_ROOMS
        value: "false"
      - key: DB_POOL_SIZE
        value: "3"
      - key: DB_MAX_OVERFLOW
        value: "2"

databases:
  - name: meryass-db
    plan: free
    databaseName: meryass
    user: meryass
